{% load static %}

<div class="otp-wrapper">

    <div class="bg-circle circle1"></div>
    <div class="bg-circle circle2"></div>

    <div class="otp-card">

        <!-- LEFT -->
        <div class="otp-left">

            <div class="brand">
                HINTECH
            </div>

            <div class="lock-icon">
                🔐
            </div>

            <h2>Verify OTP</h2>

            <p>
                Enter the 6 digit verification code sent to your
                registered email address.
            </p>

            <form method="post">

                {% csrf_token %}

                <div class="otp-input-box">

                    <span class="otp-icon">📩</span>

                    <input type="text" name="otp" maxlength="6" placeholder="Enter OTP" required>

                </div>

                <button type="submit">

                    Verify OTP

                </button>

            </form>

        </div>


        <!-- RIGHT -->

        <div class="otp-right">

            <div class="floating-icon mail">
                ✉️
            </div>

            <div class="floating-icon shield">
                🛡️
            </div>

            <img src="{% static 'images/otp-illustration.png' %}">

        </div>

    </div>

</div>


<style>
    :root {
        --primary-red: #C62828;
        --dark-red: #8e0e12;
        --logo-blue: #0B3D91;
        --light-blue: #f5f9ff;
        --text-dark: #1a1a2e;

        --shadow:
            0 20px 45px rgba(0, 0, 0, .08);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #f5f8ff;
        font-family: Arial;
        overflow: hidden;
    }


    .otp-wrapper {

        min-height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;

        position: relative;

        padding: 40px;

        background: #f7faff;

    }



    .bg-circle {

        position: absolute;

        border-radius: 50%;

        background:
            linear-gradient(135deg,
                rgba(11, 61, 145, .12),
                rgba(11, 61, 145, .35));

    }

    .circle1 {
        width: 280px;
        height: 280px;
        top: -80px;
        right: -50px;
    }

    .circle2 {
        width: 250px;
        height: 250px;
        bottom: -80px;
        left: -50px;
    }



    .otp-card {

        width: 1150px;

        height: 650px;

        background: white;

        border: 4px solid var(--logo-blue);

        border-radius: 32px;

        display: flex;

        padding: 40px;

        overflow: hidden;

        box-shadow: var(--shadow);

        position: relative;

    }



    .otp-left {

        width: 38%;

        display: flex;

        flex-direction: column;

        justify-content: center;

        padding: 20px;

    }



    .brand {

        font-size: 14px;

        font-weight: 800;

        letter-spacing: 3px;

        margin-bottom: 40px;

    }



    .lock-icon {

        width: 80px;

        height: 80px;

        background:
            linear-gradient(135deg,
                var(--logo-blue),
                #4b8fff);

        display: flex;

        justify-content: center;

        align-items: center;

        border-radius: 50%;

        font-size: 35px;

        margin-bottom: 30px;

        animation: float 3s infinite;

        box-shadow:
            0 15px 30px rgba(11, 61, 145, .25);

    }



    h2 {

        font-size: 52px;

        color: var(--text-dark);

        margin-bottom: 15px;

    }



    p {

        color: #666;

        line-height: 28px;

        margin-bottom: 35px;

    }



    .otp-input-box {

        height: 60px;

        border: 2px solid #e4e8f3;

        border-radius: 15px;

        display: flex;

        align-items: center;

        padding: 0 18px;

        margin-bottom: 30px;

        transition: .3s;

    }



    .otp-input-box:focus-within {

        border-color: var(--logo-blue);

        box-shadow:
            0 10px 25px rgba(11, 61, 145, .12);

    }



    .otp-icon {
        font-size: 22px;
        margin-right: 15px;
    }



    input {

        border: none;

        outline: none;

        width: 100%;

        font-size: 18px;

        background: transparent;

        letter-spacing: 6px;

    }



    button {

        width: 190px;

        height: 55px;

        border: none;

        background:
            linear-gradient(135deg,
                var(--logo-blue),
                #2b74ff);

        color: white;

        font-size: 16px;

        font-weight: 700;

        border-radius: 14px;

        cursor: pointer;

        transition: .4s;

        box-shadow:
            0 12px 25px rgba(11, 61, 145, .25);

    }



    button:hover {

        transform:
            translateY(-4px);

    }



    .otp-right {

        width: 62%;

        display: flex;

        justify-content: center;

        align-items: center;

        position: relative;

    }



    .otp-right img {

        width: 90%;

        animation: float 5s infinite;

    }



    .floating-icon {

        position: absolute;

        font-size: 45px;

        animation: float 4s infinite;

    }



    .mail {
        top: 120px;
        left: 90px;
    }

    .shield {
        bottom: 120px;
        right: 100px;
    }



    @keyframes float {

        0% {
            transform:
                translateY(0px);
        }

        50% {
            transform:
                translateY(-12px);
        }

        100% {
            transform:
                translateY(0px);
        }

    }



    @media(max-width:900px) {

        body {
            overflow: auto;
        }

        .otp-card {
            flex-direction: column;
            height: auto;
        }

        .otp-left,
        .otp-right {
            width: 100%;
        }

        h2 {
            font-size: 40px;
        }

    }
</style>
