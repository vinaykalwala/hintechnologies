{% load static %}

<div class="forgot-wrapper">

    <!-- Background Shapes -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="forgot-card">

        <!-- Left Side -->
        <div class="forgot-left">

            <div class="logo">
                HINTECH
            </div>

            <div class="content">

                <h2>Forgot Password</h2>

                <p>
                    Enter your registered email address to receive OTP
                    and reset your password securely.
                </p>

                <form method="post">
                    {% csrf_token %}

                    <div class="input-box">

                        <label>Email</label>

                        <input type="email" name="email" placeholder="Enter your email" required>

                    </div>

                    <button type="submit">
                        Send OTP
                    </button>

                </form>

            </div>

        </div>

        <div class="forgot-right">

            <img src="{% static 'images/forgot-illustration.jpg' %}" style="
mix-blend-mode:multiply;
filter:brightness(1.03);
">

        </div>

    </div>

</div>



<style>
    :root {
        --primary-red: #C62828;
        --dark-red: #8e0e12;
        --logo-blue: #0B3D91;
        --light-blue: #f5f9ff;
        --text-dark: #1a1a2e;

        --shadow:
            0 20px 45px rgba(0, 0, 0, .08);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #f7f9fd;
        font-family: Arial, Helvetica, sans-serif;
        overflow: hidden;
    }


    .forgot-wrapper {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        padding: 40px;
        background: #f8fbff;
    }


    .bg-shape {
        position: absolute;
        border-radius: 50%;
        filter: blur(1px);
        opacity: .9;
    }

    .shape1 {
        width: 280px;
        height: 280px;
        background: linear-gradient(135deg,
                rgba(11, 61, 145, .15),
                rgba(11, 61, 145, .35));

        top: -70px;
        right: -50px;
    }

    .shape2 {
        width: 260px;
        height: 260px;

        background: linear-gradient(135deg,
                rgba(11, 61, 145, .18),
                rgba(11, 61, 145, .35));

        bottom: -90px;
        left: -70px;
    }



    .forgot-card {
        width: 1200px;
        height: 650px;
        max-width: 100%;

        background: white;

        border: 4px solid var(--logo-blue);

        border-radius: 32px;

        display: flex;
        align-items: center;

        padding: 0px 50px;

        overflow: hidden;

        position: relative;
    }


    .forgot-left {
        width: 35%;
        padding-right: 20px;

        display: flex;
        flex-direction: column;
        justify-content: center;

        z-index: 2;
    }


    .forgot-right {

        width: 65%;

        height: 100%;

        display: flex;

        justify-content: center;

        align-items: center;

        position: relative;
    }



    .forgot-right img {

        width: 850px;

        /* IMPORTANT */
        max-width: none;

        height: auto;

        object-fit: contain;

        transform: translateX(40px);

    }

    .logo {
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 2px;
        color: var(--text-dark);
        margin-bottom: 70px;
    }



    .content h2 {
        font-size: 48px;
        color: var(--text-dark);
        margin-bottom: 14px;
        font-weight: 700;
    }


    .content p {
        font-size: 14px;
        line-height: 24px;
        color: #7c7c7c;
        margin-bottom: 35px;
    }



    .input-box {
        margin-bottom: 25px;
    }


    .input-box label {
        display: block;
        margin-bottom: 10px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-dark);
    }



    .input-box input {

        width: 100%;

        border: none;

        border-bottom: 2px solid #ddd;

        padding: 14px 0;

        background: transparent;

        outline: none;

        font-size: 15px;

        transition: .3s;

    }


    .input-box input:focus {
        border-color: var(--logo-blue);
    }



    button {

        width: 170px;

        height: 50px;

        border: none;

        background: linear-gradient(135deg,
                var(--logo-blue),
                #2b74ff);

        color: white;

        font-weight: 700;

        letter-spacing: 1px;

        cursor: pointer;

        border-radius: 8px;

        box-shadow:
            0 10px 20px rgba(11, 61, 145, .25);

        transition: .3s;

    }


    button:hover {
        transform: translateY(-4px);
    }



    .forgot-right {
        width: 62%;
        display: flex;
        justify-content: center;
        align-items: center;
    }


    .forgot-right img {
        width: 100%;
        max-width: 620px;
        object-fit: contain;
    }



    @media(max-width:900px) {

        .forgot-card {
            flex-direction: column;
        }

        .forgot-left {
            width: 100%;
        }

        .forgot-right {
            width: 100%;
            margin-top: 30px;
        }

        .content h2 {
            font-size: 36px;
        }

        body {
            overflow: auto;
        }

    }
</style>
