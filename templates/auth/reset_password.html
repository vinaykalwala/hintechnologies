{% load static %}

<div class="reset-wrapper">

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="reset-card">

        <!-- LEFT -->

        <div class="reset-left">

            <div class="brand">
                HINTECH
            </div>

            <div class="security-icon">
                🔒
            </div>

            <h2>Reset Password</h2>

            <p>
                Create a strong password for your account.
                Make sure both passwords match.
            </p>

            <form method="post">

                {% csrf_token %}

                <div class="input-box">

                    <span class="icon">🔑</span>

                    <input
                    type="password"
                    name="password"
                    placeholder="New Password"
                    required>

                </div>


                <div class="input-box">

                    <span class="icon">🛡️</span>

                    <input
                    type="password"
                    name="confirm_password"
                    placeholder="Confirm Password"
                    required>

                </div>


                <button type="submit">

                    Reset Password

                </button>

            </form>

        </div>


        <!-- RIGHT -->

        <div class="reset-right">

            <div class="float-icon lock1">🔐</div>

            <div class="float-icon lock2">🛡️</div>

            <img src="{% static 'images/reset-password.png' %}">

        </div>

    </div>

</div>



<style>

:root{
--primary-red:#C62828;
--dark-red:#8e0e12;
--logo-blue:#0B3D91;
--light-blue:#f5f9ff;
--text-dark:#1a1a2e;

--shadow:
0 20px 45px rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#f7faff;
overflow:hidden;
}


.reset-wrapper{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

position:relative;

padding:40px;

}



.bg-shape{

position:absolute;

border-radius:50%;

background:
linear-gradient(
135deg,
rgba(11,61,145,.12),
rgba(11,61,145,.35)
);

}

.shape1{
width:280px;
height:280px;
top:-80px;
right:-50px;
}

.shape2{
width:250px;
height:250px;
bottom:-70px;
left:-70px;
}



.reset-card{

width:1180px;

height:660px;

background:white;

border:4px solid var(--logo-blue);

border-radius:30px;

display:flex;

padding:40px;

overflow:hidden;

box-shadow:var(--shadow);

position:relative;

}



.reset-left{

width:38%;

display:flex;

flex-direction:column;

justify-content:center;

padding:20px;

}



.brand{

font-size:14px;

font-weight:800;

letter-spacing:3px;

margin-bottom:35px;

}



.security-icon{

width:85px;

height:85px;

background:
linear-gradient(
135deg,
var(--logo-blue),
#3579ff
);

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

font-size:35px;

margin-bottom:25px;

animation:float 4s infinite;

box-shadow:
0 15px 30px rgba(11,61,145,.25);

}



h2{

font-size:52px;

color:var(--text-dark);

margin-bottom:14px;

}



p{

color:#666;

line-height:28px;

margin-bottom:35px;

}



.input-box{

height:62px;

border:2px solid #e5eaf4;

border-radius:16px;

display:flex;

align-items:center;

padding:0 20px;

margin-bottom:22px;

transition:.4s;

}



.input-box:focus-within{

border-color:var(--logo-blue);

box-shadow:
0 10px 25px rgba(11,61,145,.15);

}



.icon{
font-size:22px;
margin-right:15px;
}



input{

width:100%;

border:none;

outline:none;

font-size:16px;

background:transparent;

}



button{

width:210px;

height:56px;

border:none;

border-radius:14px;

background:
linear-gradient(
135deg,
var(--logo-blue),
#2b74ff
);

color:white;

font-weight:700;

font-size:16px;

cursor:pointer;

transition:.4s;

box-shadow:
0 15px 25px rgba(11,61,145,.25);

}



button:hover{

transform:
translateY(-4px);

}



.reset-right{

width:62%;

display:flex;

justify-content:center;

align-items:center;

position:relative;

}



.reset-right img{

width:90%;

animation:float 5s infinite;

}



.float-icon{

position:absolute;

font-size:45px;

animation:float 4s infinite;

}

.lock1{
top:110px;
left:90px;
}

.lock2{
bottom:120px;
right:80px;
}



@keyframes float{

0%{
transform:
translateY(0);
}

50%{
transform:
translateY(-12px);
}

100%{
transform:
translateY(0);
}

}



@media(max-width:900px){

body{
overflow:auto;
}

.reset-card{
flex-direction:column;
height:auto;
}

.reset-left,
.reset-right{
width:100%;
}

h2{
font-size:40px;
}

}

</style>
