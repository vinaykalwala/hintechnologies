{% extends 'base.html' %}

{% block title %}Server Error - 500{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <h1 class="display-1 text-danger">500</h1>
            <h2>Internal Server Error</h2>
            <p class="lead">Something went wrong on our end. Please try again later.</p>
            <p>Our team has been notified. If the problem persists, please contact us.</p>
            <a href="{% url 'hin:home' %}" class="btn btn-primary">Return to Home</a>
        </div>
    </div>
</div>
{% endblock %}
