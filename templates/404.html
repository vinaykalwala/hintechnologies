{% extends 'base.html' %}

{% block title %}Page Not Found - 404{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <h1 class="display-1 text-warning">404</h1>

            <a href="{% url 'hin:home' %}" class="btn btn-primary">Return to Home</a>
        </div>
    </div>
</div>
{% endblock %}
