{% extends 'base.html' %}
{% load static %}

{% block title %}

Delete Service

{% endblock %}

{% block content %}

<div class="delete-wrapper">

<div class="delete-card">

<div class="delete-icon">

<i class="fas fa-trash-alt"></i>

</div>

<h2>

Delete Service?

</h2>

<p class="warning">

You are about to delete

<strong>

{{service.title}}

</strong>

</p>

{% if service.image %}

<img
src="{{service.image.url}}"

class="service-preview">

{% endif %}

<div class="info-box">

<p>

This action cannot be undone.

</p>

</div>

<form method="POST">

{% csrf_token %}

<div class="btn-group-delete">

<a
href="{% url 'hin:service_manage' %}"

class="cancel-btn">

Cancel

</a>

<button
type="submit"

class="delete-btn-page">

Delete Service

</button>

</div>

</form>

</div>

</div>

<style>

.delete-wrapper{

min-height:85vh;

display:flex;

align-items:center;

justify-content:center;

padding:40px;

background:

linear-gradient(
135deg,

#f8fafc,

#eef5fb
);

}

.delete-card{

background:white;

width:500px;

padding:45px;

border-radius:30px;

text-align:center;

box-shadow:

0 20px 50px rgba(
0,0,0,.08
);

}

.delete-icon{

width:100px;

height:100px;

margin:auto;

border-radius:50%;

background:

linear-gradient(
135deg,

#ffebeb,

#ffe0e0
);

display:flex;

align-items:center;

justify-content:center;

font-size:40px;

color:#b31217;

margin-bottom:25px;

}

.warning{

font-size:17px;

color:#555;

margin:20px 0;
}

.service-preview{

width:100%;

height:220px;

object-fit:cover;

border-radius:20px;

margin:20px 0;
}

.info-box{

background:#fff5f5;

padding:15px;

border-radius:15px;

margin:20px 0;

color:#b31217;

font-weight:600;

}

.btn-group-delete{

display:flex;

gap:15px;

margin-top:25px;
}

.cancel-btn{

flex:1;

padding:15px;

border-radius:15px;

background:#eef1f5;

text-decoration:none;

color:black;

font-weight:600;

}

.delete-btn-page{

flex:1;

border:none;

padding:15px;

border-radius:15px;

background:

linear-gradient(
135deg,

#b31217,

#8e0e12
);

color:white;

font-weight:600;

}

</style>

{% endblock %}
