<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIN Technologies - {% block title %}DevOps Training{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'hin/css/custom.css' %}">
</head>
<body>
    {% include 'cms/includes/navbar.html' %}
    
    {% include 'cms/includes/messages.html' %}
    
    <main>
        {% block content %}
        {% endblock %}
    </main>
    
    {% include 'cms/includes/footer.html' %}
    
    {% include 'cms/includes/delete_modal.html' %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Delete confirmation modal handler
        document.addEventListener('DOMContentLoaded', function() {
            var deleteModal = document.getElementById('deleteModal');
            if (deleteModal) {
                deleteModal.addEventListener('show.bs.modal', function(event) {
                    var button = event.relatedTarget;
                    var deleteUrl = button.getAttribute('data-delete-url');
                    var deleteForm = document.getElementById('deleteForm');
                    if (deleteForm) {
                        deleteForm.action = deleteUrl;
                    }
                });
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
