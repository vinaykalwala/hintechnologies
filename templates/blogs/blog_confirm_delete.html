{% extends 'base.html' %}

{% block title %}

Delete Blog

{% endblock %}

{% block content %}

<div class="delete-wrapper">

<div class="delete-card">

<div class="delete-icon">

<i class="fas fa-trash-alt"></i>

</div>

<h2>

Delete Blog?

</h2>

<p class="delete-text">

Are you sure you want to delete

<strong>

{{ blog.title }}

</strong>

?

</p>

{% if blog.featured_image %}

<img
src="{{ blog.featured_image.url }}"

class="delete-img">

{% endif %}

<div class="warning-box">

⚠ This action cannot be undone

</div>
<div class="delete-actions">

<a
href="{% url 'hin:blog_manage' %}"

class="cancel-btn">

Cancel

</a>

<a
href="{% url 'hin:blog_manage' %}"

class="delete-btn-page">

Delete Blog

</a>

</div>
</div>

</div>

<style>

.delete-wrapper{

min-height:85vh;

display:flex;

align-items:center;

justify-content:center;

padding:40px;

background:
linear-gradient(
135deg,

#f8fafc,

#eef5fb);

}

.delete-card{

background:white;

width:550px;

padding:45px;

border-radius:30px;

text-align:center;

box-shadow:
0 20px 50px rgba(
0,0,0,.08);

}

.delete-icon{

width:100px;

height:100px;

margin:auto;

border-radius:50%;

background:
linear-gradient(
135deg,

#ffe7e7,

#ffdada);

display:flex;

align-items:center;

justify-content:center;

font-size:38px;

color:#b31217;

margin-bottom:25px;

}

.delete-text{

font-size:17px;

margin:20px 0;

color:#475569;

}

.delete-img{

width:100%;

height:230px;

object-fit:cover;

border-radius:20px;

margin:20px 0;

}

.warning-box{

background:#fff1f1;

padding:15px;

border-radius:14px;

color:#b31217;

font-weight:600;

margin-bottom:25px;

}

.delete-actions{

display:flex;

gap:15px;

}

.cancel-btn{

flex:1;

padding:14px;

border-radius:14px;

background:#eef2f7;

text-decoration:none;

color:black;

font-weight:600;

}

.delete-btn-page{

flex:1;

border:none;

padding:14px;

border-radius:14px;

background:
linear-gradient(
135deg,

#b31217,

#8e0e12);

color:white;

font-weight:600;

}

@media(max-width:576px){

.delete-card{

width:100%;

padding:30px;

}

.delete-actions{

flex-direction:column;

}

}

</style>

{% endblock %}
